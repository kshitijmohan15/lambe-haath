<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chargesheet Tool — Redesign Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Hanken+Grotesk:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:wght@400;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #e7e2d6; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="docket.jsx"></script>
<script type="text/babel" src="chambers.jsx"></script>
<script type="text/babel" src="ledger.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel" data-presets="react">
const W = 1380, H = 860;

function App() {
  return (
    <DesignCanvas>
      <DCSection id="docket" title="I · Docket" subtitle="Vertical pipeline rail · classic & official · Public Sans + Spectral">
        <DCArtboard id="dk-proj" label="Matters" width={W} height={H}><DocketProjects /></DCArtboard>
        <DCArtboard id="dk-slice" label="Slice workspace" width={W} height={H}><DocketSlice /></DCArtboard>
        <DCArtboard id="dk-prompt" label="Defence analysis" width={W} height={H}><DocketPrompts /></DCArtboard>
      </DCSection>

      <DCSection id="chambers" title="II · Chambers" subtitle="Horizontal stepper pipeline · airy & editorial · Hanken Grotesk + Newsreader">
        <DCArtboard id="cb-proj" label="Matters" width={W} height={H}><ChambersProjects /></DCArtboard>
        <DCArtboard id="cb-slice" label="Slice workspace" width={W} height={H}><ChambersSlice /></DCArtboard>
        <DCArtboard id="cb-prompt" label="Defence analysis" width={W} height={H}><ChambersPrompts /></DCArtboard>
      </DCSection>

      <DCSection id="ledger" title="III · Ledger" subtitle="Persistent matter rail + segmented pipeline · dense & data-forward · IBM Plex">
        <DCArtboard id="lg-proj" label="All matters" width={W} height={H}><LedgerProjects /></DCArtboard>
        <DCArtboard id="lg-slice" label="Slice workspace" width={W} height={H}><LedgerSlice /></DCArtboard>
        <DCArtboard id="lg-prompt" label="Defence analysis" width={W} height={H}><LedgerPrompts /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
