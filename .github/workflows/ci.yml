name: ci

# Build-only gate that fires on every PR targeting main. Verifies that
# chargesheet-ui builds and logos compiles + links for each shipped platform.
# No smoke test, no release, no install-verify. Use the `release` workflow
# (tag-driven) for those.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - working-directory: chargesheet-ui
        run: |
          yarn install --frozen-lockfile
          yarn build

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,      target: aarch64-macos,      platform: macos-arm64 }
          - { os: ubuntu-latest, target: x86_64-linux-musl,  platform: linux-x64 }
          - { os: ubuntu-latest, target: x86_64-windows-gnu, platform: windows-x64 }
          # macos-x64 cross-compile is shipped but not exercised here — it
          # mirrors macos-arm64 sources, and Intel-mac runners are
          # effectively unavailable. The release pipeline still builds it.
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: mlugg/setup-zig@v2
        with: { version: "0.16.0" }
      - name: Cache MuPDF/zig build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/zig
            logos/.zig-cache
          key: ci-zigbuild-${{ matrix.platform }}-${{ hashFiles('mupdf-zig/**', 'logos/build.zig.zon', 'logos/build.zig') }}
      - name: Fetch MuPDF source
        # mupdf-zig is a PATH dependency of logos; zig does not auto-fetch a
        # path dep's transitive *lazy* deps. The mupdf-zig module is generated
        # via translate-c against these headers, so without the source the
        # module is missing and zig build panics. Pre-fetch by URL.
        working-directory: logos
        run: zig fetch "https://mupdf.com/downloads/archive/mupdf-1.27.2-source.tar.gz"
      - name: Build logos
        working-directory: logos
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe
